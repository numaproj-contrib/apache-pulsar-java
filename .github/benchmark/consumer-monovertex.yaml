apiVersion: numaflow.numaproj.io/v1alpha1
kind: MonoVertex
metadata:
  name: consumer-mvtx
spec:
  replicas: 1
  scale:
    min: 1
    max: 1
  limits:
    readBatchSize: 500
  volumes:
    - name: pulsar-config-volume
      configMap:
        name: consumer-config
        items:
          - key: application.yml
            path: application.yml
  source:
    udsource:
      container:
        image: ${IMAGE_TAG}
        args: ["--config=file:/conf/application.yml"]
        imagePullPolicy: Never
        resources:
          requests:
            cpu: 1300m
            memory: 640Mi
          limits:
            cpu: 1300m
            memory: 640Mi
        volumeMounts:
          - name: pulsar-config-volume
            mountPath: /conf
  sink:
    log: {}
