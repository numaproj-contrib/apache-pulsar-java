apiVersion: v1
kind: Pod
metadata:
  name: pulsar
  labels:
    app: pulsar
spec:
  containers:
    - name: pulsar
      image: apachepulsar/pulsar:4.0.0
      command: ["bin/pulsar", "standalone"]
      ports:
        - containerPort: 6650
          name: pulsar
        - containerPort: 8080
          name: admin
      resources:
        requests:
          cpu: 200m
          memory: 5000Mi
        limits:
          cpu: 200m
          memory: 5000Mi
      readinessProbe:
        httpGet:
          path: /admin/v2/clusters
          port: 8080
        initialDelaySeconds: 10
        periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pulsar
spec:
  selector:
    app: pulsar
  ports:
    - name: pulsar
      port: 6650
      targetPort: 6650
    - name: admin
      port: 8080
      targetPort: 8080
