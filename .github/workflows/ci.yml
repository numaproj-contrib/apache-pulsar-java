
name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  checkstyle:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 23
      uses: actions/setup-java@v4
      with:
        java-version: '23'
        distribution: 'temurin'
        cache: maven
    - name: Checkstyle
      run: mvn checkstyle:check

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 23
      uses: actions/setup-java@v4
      with:
        java-version: '23'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven, run unit tests
      run: mvn clean install 

  coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 23
      uses: actions/setup-java@v4
      with:
        java-version: '23'
        distribution: 'temurin'
        cache: maven
    - name: Run tests with coverage
      run: mvn clean test
    - name: Post coverage summary
      if: always()
      run: |
        if [ -f target/site/jacoco/jacoco.csv ]; then
          echo "## Code Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          awk -F',' '
            NR > 1 {
              missed += $4; covered += $5
              bmissed += $6; bcovered += $7
              lmissed += $8; lcovered += $9
            }
            END {
              if (covered + missed > 0)
                ipc = sprintf("%.1f", covered / (covered + missed) * 100)
              else ipc = "N/A"
              if (bcovered + bmissed > 0)
                bpc = sprintf("%.1f", bcovered / (bcovered + bmissed) * 100)
              else bpc = "N/A"
              if (lcovered + lmissed > 0)
                lpc = sprintf("%.1f", lcovered / (lcovered + lmissed) * 100)
              else lpc = "N/A"
              print "| Metric | Covered | Missed | Coverage |"
              print "|--------|---------|--------|----------|"
              printf "| Instructions | %d | %d | %s%% |\n", covered, missed, ipc
              printf "| Branches | %d | %d | %s%% |\n", bcovered, bmissed, bpc
              printf "| Lines | %d | %d | %s%% |\n", lcovered, lmissed, lpc
            }
          ' target/site/jacoco/jacoco.csv >> $GITHUB_STEP_SUMMARY
        else
          echo "No coverage report found." >> $GITHUB_STEP_SUMMARY
        fi
