name: Test Quay.io Push

on:
  push:
    branches: [ "feat/automated-cicd" ]

jobs:
  push-image:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 23
      uses: actions/setup-java@v4
      with:
        java-version: '23'
        distribution: 'temurin'
        cache: maven

    - name: Build and push image to Quay.io
      run: |
        mvn clean package -DskipTests \
          -Djib.to.image=quay.io/numaio/numaflow-java/pulsar-java:${{ github.sha }} \
          -Djib.to.tags=latest \
          -Djib.to.auth.username=${{ secrets.QUAY_USERNAME }} \
          -Djib.to.auth.password=${{ secrets.QUAY_PASSWORD }} \
          jib:build
