name: Release Please

on:
  push:
    branches: [feat/automated-cicd]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          target-branch: feat/automated-cicd

  push-image:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: maven

      - name: Build and push image to Quay.io
        run: |
          mvn clean package -DskipTests \
            -Djib.to.image=quay.io/numaio/numaflow-java/pulsar-java:${{ needs.release-please.outputs.tag_name }} \
            -Djib.to.tags=latest \
            -Djib.to.auth.username=${{ secrets.QUAY_USERNAME }} \
            -Djib.to.auth.password=${{ secrets.QUAY_PASSWORD }} \
            jib:build
