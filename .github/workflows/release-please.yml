name: Release Please

# test run edit
on:
  push:
    branches: [feat/automated-cicd]

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          target-branch: feat/automated-cicd

  push-image:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: maven

      - name: Get version from pom.xml
        id: version
        run: echo "tag=v$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> "$GITHUB_OUTPUT"

      - name: Build and push image to Quay.io
        run: |
          mvn clean package -DskipTests \
            -Djib.to.image=quay.io/numaio/numaflow-java/pulsar-java:${{ steps.version.outputs.tag }} \
            -Djib.to.tags=latest \
            -Djib.to.auth.username=${{ secrets.QUAYIO_USERNAME }} \
            -Djib.to.auth.password=${{ secrets.QUAYIO_PASSWORD }} \
            jib:build
